name: govulncheck

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday 03:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/govulncheck.yaml'

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      -
        name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
