name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      -
        name: Run go test
        run: go test -race ./...
      -
        name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
